{% load static %}
<!-- 国家选择器（纯 JS API，UI 由顶部导航栏的筛选条接管） -->

<script>
  /**
   * 国家选择器交互脚本
   * 职责：
   *   1. 管理当前选中国家
   *   2. 持久化到 localStorage
   *   3. 切换时触发 window 事件 jkfCountryChange
   * 说明：UI 已迁移到顶部通栏导航的筛选 pill 条，本组件仅保留 JS API。
   */
  (function () {
    "use strict";

    /** 支持的国家列表
     *  新增国家：在此追加 { code: "XX", flag: "🇽🇽" }，
     *  并在 SexyChatWeb/data/ 下创建对应的 XX.json 数据文件即可。
     */
    const COUNTRIES = [
      { code: "CN", flag: "🇨🇳" },
      { code: "JP", flag: "🇯🇵" },
      { code: "PK", flag: "🇵🇰" },
      { code: "RU", flag: "🇷🇺" },
      { code: "MN", flag: "🇲🇳" },
      { code: "SG", flag: "🇸🇬" },
      { code: "MY", flag: "🇲🇾" },
      { code: "VN", flag: "🇻🇳" },
      { code: "PH", flag: "🇵🇭" },
      { code: "KH", flag: "🇰🇭" },
      { code: "MM", flag: "🇲🇲" },
      { code: "IN", flag: "🇮🇳" },
      { code: "BD", flag: "🇧🇩" },
      { code: "MV", flag: "🇲🇻" },
      { code: "SA", flag: "🇸🇦" },
      { code: "IL", flag: "🇮🇱" },
      { code: "TR", flag: "🇹🇷" }
    ];

    /** 国家选择 localStorage key */
    const STORAGE_KEY = "jkf-country";
    /** 默认国家 */
    const DEFAULT_COUNTRY = "CN";

    /** 当前国家（启动时从 localStorage 读取） */
    let _currentCountry = _loadCountry();

    /**
     * 从 localStorage 读取国家偏好
     * @returns {string} 国家代码
     */
    function _loadCountry() {
      try {
        const c = localStorage.getItem(STORAGE_KEY);
        if (COUNTRIES.some(function (item) { return item.code === c; })) return c;
      } catch (e) { /* 忽略，用默认 */ }
      return DEFAULT_COUNTRY;
    }

    /**
     * 持久化国家选择
     * @param {string} code
     */
    function _saveCountry(code) {
      try { localStorage.setItem(STORAGE_KEY, code); } catch (e) {}
    }

    /**
     * 选择国家：持久化 + 触发事件
     * @param {string} code
     */
    function selectCountry(code) {
      if (!COUNTRIES.some(function (item) { return item.code === code; })) return;
      if (code === _currentCountry) return;
      _currentCountry = code;
      _saveCountry(code);
      window.dispatchEvent(new CustomEvent("jkfCountryChange", { detail: { country: code } }));
    }

    // 初始化后触发一次，让筛选条同步状态
    window.dispatchEvent(new CustomEvent("jkfCountryInit", { detail: { country: _currentCountry } }));

    /** 暴露 API 供外部调用 */
    window.jkfSwitcher = {
      getCountry: function () { return _currentCountry; },
      setCountry: selectCountry,
      getLang: function () { return "zh"; },
      setLang: function () {}
    };
  })();
</script>
